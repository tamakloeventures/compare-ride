<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
    background: #0f172a;
  }

  .card {
    width: 1200px;
    height: 630px;
    background: #0f172a;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 80px;
    overflow: hidden;
  }

  /* Background glow blobs */
  .blob1 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.22) 0%, transparent 70%);
    top: -100px;
    right: -60px;
    pointer-events: none;
  }

  .blob2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(16,185,129,0.16) 0%, transparent 70%);
    bottom: -80px;
    left: 200px;
    pointer-events: none;
  }

  /* Top label */
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-bottom: 28px;
    width: fit-content;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    display: inline-block;
  }

  /* Main headline */
  h1 {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: #ffffff;
    margin-bottom: 20px;
    max-width: 700px;
  }

  h1 span.green {
    color: #10b981;
  }

  /* Subline */
  .sub {
    font-size: 26px;
    color: rgba(255,255,255,0.55);
    font-weight: 500;
    line-height: 1.4;
    max-width: 580px;
    margin-bottom: 40px;
  }

  /* Provider pills */
  .providers {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.01em;
  }

  .pill-uber {
    background: #ffffff;
    color: #000000;
  }

  .pill-lyft {
    background: linear-gradient(90deg, #ff00b8, #e600a7);
    color: #ffffff;
  }

  .pill-bolt {
    background: #34d399;
    color: #064e3b;
  }

  .pill-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
  }

  /* Right side graphic */
  .right-panel {
    position: absolute;
    right: 72px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: flex-end;
  }

  .fare-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    min-width: 280px;
    backdrop-filter: blur(8px);
  }

  .fare-card.best {
    background: rgba(16,185,129,0.12);
    border-color: rgba(16,185,129,0.35);
  }

  .fare-logo {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 16px;
    flex-shrink: 0;
  }

  .fare-logo.uber { background: #000; color: #fff; }
  .fare-logo.lyft { background: #ff00b8; color: #fff; }
  .fare-logo.bolt { background: #34d399; color: #064e3b; }

  .fare-info { flex: 1; }

  .fare-name {
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
  }

  .fare-price {
    font-size: 22px;
    font-weight: 900;
    color: #ffffff;
    margin-top: 2px;
  }

  .best-badge {
    background: #10b981;
    color: #fff;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
  }

  /* Bottom brand */
  .brand {
    position: absolute;
    bottom: 36px;
    left: 80px;
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
  }

  .brand span {
    color: rgba(255,255,255,0.6);
  }

  /* URL tag */
  .url-tag {
    position: absolute;
    bottom: 36px;
    right: 72px;
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <!-- Left content -->
  <div class="eyebrow">
    <span class="dot"></span>
    Free · No sign-up required
  </div>

  <h1>Compare Uber<br>&amp; Lyft <span class="green">instantly.</span></h1>

  <p class="sub">Find the cheapest ride in seconds and launch it directly in the official app.</p>

  <div class="providers">
    <div class="pill pill-uber">🚗 Uber</div>
    <div class="pill pill-lyft">🩷 Lyft</div>
    <div class="pill pill-bolt">⚡ Bolt</div>
  </div>

  <!-- Right fare cards -->
  <div class="right-panel">
    <div class="fare-card best">
      <div class="fare-logo uber">U</div>
      <div class="fare-info">
        <div class="fare-name">Uber</div>
        <div class="fare-price">$14.20–$17.40</div>
      </div>
      <div class="best-badge">Best</div>
    </div>

    <div class="fare-card">
      <div class="fare-logo lyft">L</div>
      <div class="fare-info">
        <div class="fare-name">Lyft</div>
        <div class="fare-price">$15.80–$19.20</div>
      </div>
    </div>

    <div class="fare-card">
      <div class="fare-logo bolt">B</div>
      <div class="fare-info">
        <div class="fare-name">Bolt</div>
        <div class="fare-price">GH₵ 42–51</div>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="brand">By <span>Tamakloe Ventures LLC</span></div>
  <div class="url-tag">ride.tamakloeventures.com</div>
</div>
</body>
</html>
